name: Sync GitHub Repos to GitLab and Gitee

on:
  workflow_dispatch:
  schedule:
    # Every 7 days at 03:00 UTC
    - cron: "0 3 * * 0"

jobs:
  get_repos:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      repository-projects: read
    outputs:
      repo_list: ${{ steps.get-all-repos.outputs.repos }}
    steps:
      - name: Get all repositories
        id: get-all-repos
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const excludeRepo = context.repo.repo; // exclude this profile repo
            const repos = [];
            for (let page = 1; ; page++) {
              const { data } = await github.rest.repos.listForAuthenticatedUser({
                per_page: 100,
                page,
                sort: 'updated',
                direction: 'desc',
              });
              if (data.length === 0) break;
              for (const repo of data) {
                if (!repo.archived && !repo.fork && repo.name !== excludeRepo) {
                  repos.push(repo.name);
                }
              }
              if (data.length < 100) break;
            }
            const repoJson = JSON.stringify(repos);
            core.setOutput('repos', repoJson);

  sync_repos:
    needs: get_repos
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJSON(needs.get_repos.outputs.repo_list) }}
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/${{ matrix.repo }}
          path: ${{ matrix.repo }}
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Sync to GitLab and Gitee
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITLAB_REPO_OWNER: ${{ github.repository_owner }}
          GITEE_REPO_OWNER: ${{ github.repository_owner }}
        run: |
          cd ${{ matrix.repo }}

          BRANCH=$(git branch --show-current)
          echo "Default branch: $BRANCH"

          for remote in gitlab gitee; do
            if [ "$remote" = "gitlab" ]; then
              URL="https://${GITLAB_REPO_OWNER}:${GITLAB_TOKEN}@gitlab.com/${GITLAB_REPO_OWNER}/${{ matrix.repo }}.git"
              HOST="gitlab.com"
            else
              URL="https://${GITEE_REPO_OWNER}:${GITEE_TOKEN}@gitee.com/${GITEE_REPO_OWNER}/${{ matrix.repo }}.git"
              HOST="gitee.com"
            fi

            git remote remove $remote 2>/dev/null || true
            git remote add $remote "$URL"

            git fetch $remote $BRANCH 2>/dev/null || true
            if ! git show-ref --verify --quiet refs/remotes/$remote/$BRANCH 2>/dev/null || \
               ! git diff --quiet $remote/$BRANCH..$BRANCH; then
              git push $remote $BRANCH --force
            else
              echo "No changes to push to $HOST."
            fi
          done
